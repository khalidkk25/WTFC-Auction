<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Player</title>
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">WTFC Auction</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="players.html">Players</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="captain.html">Captains</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <br />

    <div class="container">
        <div class="row">
            <div class="col-sm-9">
                <div class="container">
                    <center>
                        <button type="button" class="btn btn-primary" id="randomPlayer">
                            Select Random Player
                        </button>
                        <p id="errortext"></p>
                    </center>
                    <div id="leadboard" style="display: flex;justify-content: space-between;align-items: center;">
                        <div id="leadPlayer"> </div>
                        <div style="
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
" id="leadTimer">
                            <div id="timer" style=" font-size: 5em;"> 30 </div>
                            <button id="buyPlayer" class="btn btn-success">BUY </button>
                        </div>
                        <div id="leadCaption"></div>

                    </div>
                </div>

            </div>
            <div class="col-sm-3">
                <ul class="list-group" id="players">
                    <!-- <li class="list-group-item active" aria-current="true">An active item</li>
                    <li class="list-group-item">A second item</li>
                    <li class="list-group-item">A third item</li>
                    <li class="list-group-item">A fourth item</li>
                    <li class="list-group-item">And a fifth one</li> -->
                </ul>
            </div>
        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>

        var CAPTIONS = {
            maxBitSecond: 60,
            bitingSecond: 60,
            timer: undefined,
            index: 0,
            details: [],
            picked: {}
        }
        var PLAYERS = {
            details: [],
            notSold: {},
            staged: {}
        }
        const loadPlayers = () => {
            const players = $("#players")
            players.empty();
            axios.get("players").then(result => {
                console.log(result)
                if (result.status == 200) {
                    PLAYERS.details = result.data;
                    result.data.forEach(element => {
                        if (element.sold !== true) {
                            PLAYERS.notSold[element._id] = element
                        }
                        players.append(` <li class="list-group-item ${element.sold == true ? 'list-group-item-danger' : ''} " id="player_${element._id}">${element.name}</li>`)
                    });
                }
            }).catch(err => {
                console.log("Axios error", err)
            })


        }

        const loadCaptions = () => {

            axios.get("captains").then(result => {
                console.log(result)
                if (result.status == 200) {
                    CAPTIONS.details = result.data;
                }
            }).catch(err => {
                console.log("Axios error", err)
            })


        }

        function getRandomIntInclusive(min, max) {
            min = Math.ceil(min);
            max = Math.floor(max);
            return Math.floor(Math.random() * (max - min)) + min; // The maximum is inclusive and the minimum is inclusive
        }

        const pickRandomPlayer = () => {
            const keys = Object.keys(PLAYERS.notSold).length > 0 ? Object.keys(PLAYERS.notSold) : Object.keys(PLAYERS.staged)
            if (keys.length == 0) $("#randomPlayer").attr("disabled", true)
            const index = getRandomIntInclusive(0, keys.length)
            CAPTIONS.picked = PLAYERS.notSold[keys[index]] || PLAYERS.staged[keys[index]]
            delete PLAYERS.notSold[keys[index]]
            console.log(index, CAPTIONS.picked)
            $("#randomPlayer").hide()
            $("#leadTimer").hide()
            $("#leadCaption").hide()
            const element = CAPTIONS.picked;
            $("#leadPlayer").html(`
            
                <div class="card shadow-sm" style="width: 18rem;">
                    <img src="${element.image || './images/image.png'}" class="card-img-top" alt="Profile Image">
                    <div class="card-body text-center">
                        <h5 class="card-title">${element.name}</h5>
                        <p class="card-text"> ${element.designation}</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button id="startBit" rowId="${element._id}" class="btn btn-primary edit">START BITTING</button>
                            </div>
                    </div>
                </div>
            `)
            $("#buy").hide()

        }
        const startBitting = () => {
            $("#startBit").hide();
            if (CAPTIONS.index === CAPTIONS.details.length) {
                $("#leadboard").hide()
                $("#randomPlayer").show()
                $("#errortext").html(`<div class="alert alert-danger" role="alert">
  Last Player Not Picked by any captain
</div>`)
            }

            const element = CAPTIONS.details[CAPTIONS.index];
            $("#leadTimer").show()
            $("#leadCaption").show()
            $("#leadCaption").html(`
                <div class="card shadow-sm" style="width: 18rem;">
                    <img src="${element.image || './images/image.png'}" class="card-img-top" alt="Profile Image">
                    <div class="card-body text-center">
                        <h5 class="card-title">${element.name}</h5>
                        <p class="card-text"> ${element.designation}</p>
                    </div>
                </div>
            `)

            CAPTIONS.index++;
            if (CAPTIONS.index == CAPTIONS.length) {
                CAPTIONS.index = 0
            }
            if (CAPTIONS.timer) {
                clearInterval(CAPTIONS.timer)
            }
            CAPTIONS.bitingSecond = CAPTIONS.maxBitSecond;
            $("#timer").text(CAPTIONS.maxBitSecond)
            CAPTIONS.timer = setInterval(displayNumber, 1000)

        }



        const displayNumber = () => {

            CAPTIONS.bitingSecond--;
            $("#timer").text(CAPTIONS.bitingSecond)
            if (CAPTIONS.bitingSecond == 0) {
                if (CAPTIONS.timer) {
                    clearInterval(CAPTIONS.timer)
                }
                startBitting()
            }
        }
        const buyNewPlayer = () => {
            if (CAPTIONS.timer) {
                clearInterval(CAPTIONS.timer)
            }
            $("#leadboard").hide()
            $("#randomPlayer").show()
            $("#errortext").html(`<div class="alert alert-success" role="alert">
  This player has been bought successfully 
</div>`)
        }

        $(document).on("click", "#randomPlayer", () => {
            $("#leadboard").show()
            pickRandomPlayer()
        })
        $(document).on("click", "#startBit", () => {
            startBitting()
        })

        $(document).on("click", "#buyPlayer", () => {
            buyNewPlayer()
        })

        $(document).ready(() => {
            loadPlayers()
            loadCaptions()
            $("#leadboard").hide()
        })


    </script>
</body>

</html>
