    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        var GLOBAL_DATA = { timeout: 15, current: 0, timer: undefined, skip: [] }
        function getRandomIntInclusive(min, max) {
            min = Math.ceil(min);
            max = Math.floor(max);
            return Math.floor(Math.random() * (max - min)) + min; // The maximum is inclusive and the minimum is inclusive
        }

        const loadPlayers = () => {

            axios.get("/players").then(result => {
                console.log(result)
                const players = $("#players")
                players.empty()
                if (result.status == 200) {
                    GLOBAL_DATA.players = result.data;
                    GLOBAL_DATA.availablePlayers = []
                    GLOBAL_DATA.players.forEach(element => {
                        if (element.sold !== true) {
                            GLOBAL_DATA.availablePlayers.push(element)
                            players.append(` 
                            <li class="list-group-item d-flex justify-content-between align-items-center" id="captain_${element._id}">
                            ${element.name} | ${element.designation}
                            <span class="badge badge-primary badge-pill">${element.score}</span>
                            </li>`)
                        }
                    });
                }
            }).catch(err => {
                console.log("Axios error", err)
            })


        }

        // const loadCaptains = () => {
        //     axios.get("captains").then(result => {
        //         console.log(result)
        //         const captains = $("#captains")
        //         captains.empty()
        //         const buyingCaption = $("#buyingCaption");
        //         buyingCaption.empty()
        //         if (result.status == 200) {
        //             GLOBAL_DATA.captains = result.data;
        //             GLOBAL_DATA.captains.forEach(element => {
        //                 if (element.score > 0) {
        //                     buyingCaption.append(`<option value="${element._id}">${element.name} (${element.score}) </option>`)
        //                     captains.append(` 
        //                 <li class="list-group-item d-flex justify-content-between align-items-center" id="captain_${element._id}">
        //                 ${element.name}
        //                 <span class="badge badge-primary badge-pill">${element.score}</span>
        //                 </li>`)
        //                 }
        //             });
        //         }
        //     }).catch(err => {
        //         console.log("Axios error", err)
        //     })
        // }

        const loadCaptains = () => {
    axios.get("/captains").then(result => {
        const captains = $("#captains");
        captains.empty();
        const buyingCaption = $("#buyingCaption");
        buyingCaption.empty();

        // Color mapping based on team names
        const teamColors = {
            "wt royale": "#e74c3c",   // Red
            "wt mariners": "#000000", // Black
            "wt citadel": "#ffffff",  // White
            "wt dunes": "#f1c40f",    // Yellow
            "wt groves": "#27ae60"    // Green
        };

        if (result.status == 200) {
            GLOBAL_DATA.captains = result.data;
            GLOBAL_DATA.captains.forEach(element => {
                const teamNameLower = element.name.toLowerCase();
                const bgColor = teamColors[teamNameLower] || "#585858"; // Fallback to grey
                const isCitadel = teamNameLower === "wt citadel";

                if (element.score > 0) {
                    buyingCaption.append(`<option value="${element._id}">${element.name} (${element.score}) </option>`);
                    
                    captains.append(` 
                        <li class="list-group-item d-flex justify-content-between align-items-center" id="captain_${element._id}">
                            ${element.name}
                            <span class="badge badge-pill badge-team ${isCitadel ? 'wt-citadel-badge' : ''}" 
                                  style="background-color: ${bgColor}; ${isCitadel ? 'border: 1px solid #ccc;' : ''}">
                                ${element.score}
                            </span>
                        </li>`);
                }
            });
        }
    }).catch(err => {
        console.log("Axios error", err);
    });
}

        const timerFunction = () => {
            GLOBAL_DATA.current--;
            // $("#playerTimer").css("font-size", '50px')
            // $("#playerTimer").text(GLOBAL_DATA.current);
            if (GLOBAL_DATA.current == 0) {
                $("#message").html(`
                <div class="alert alert-danger" role="alert">
                Time Out 
                </div>`)
                $("#randomPlayer").show()
                $("#randomPlayer").text("Pick Random Player")
                $("#randomPlayer").attr("class", "btn btn-success");
                $("#playerCard").hide()
                $("#startBitting").hide()
            }

        }


        const randomPlayerSelect = () => {

            if (GLOBAL_DATA.timer) {
                clearInterval(GLOBAL_DATA.timer)
            }

            if ($("#randomPlayer").text() == "Skip") {

                // add to skipped list
                GLOBAL_DATA.skip.push(GLOBAL_DATA.selectedPlayer)

                // remove from available players
                GLOBAL_DATA.availablePlayers = GLOBAL_DATA.availablePlayers.filter(
                    item => item._id != GLOBAL_DATA.selectedPlayer._id
                )

                // if no players left, bring skipped players back
                if (GLOBAL_DATA.availablePlayers.length === 0) {
                    GLOBAL_DATA.availablePlayers = [...GLOBAL_DATA.skip]
                    GLOBAL_DATA.skip = []
                }
            }

            $("#playerCard").hide()
            $("#startBitting").hide()
            $("#message").empty()
            if (GLOBAL_DATA.availablePlayers.length == 0) {
                $("#message").html(`
                <div class="alert alert-danger" role="alert">
                All Players Sold Out
                </div>`)
            }
            const index = getRandomIntInclusive(0, GLOBAL_DATA.availablePlayers.length)
            const player = GLOBAL_DATA.availablePlayers[index];
            GLOBAL_DATA.selectedPlayer = player
            console.log(GLOBAL_DATA.selectedPlayer)

            $("#playerCard").show()
            $("#startBitting").show()
            $("#playerImage").attr("src", player.image || './images/image.png')
            $("#playerName").text(player.name)
            $("#playerDesignation").text(player.designation)
            $("#playerScore").text(player.score || 0)
            // $("#playerTimer").text(GLOBAL_DATA.timeout)
            GLOBAL_DATA.current = GLOBAL_DATA.timeout;
            $("#actions").hide()
            $("#randomPlayer").text("Skip")
            $("#randomPlayer").attr("class", "btn btn-danger")

        }
        const startBittingClick = () => {
            $("#message").empty()
            $("#startBitting").hide();
            // $("#randomPlayer").text("Pick Random Player")
            // $("#randomPlayer").attr("class", "btn btn-success");
            // $("#randomPlayer").hide()
            $("#actions").show()
            $("#buyStatus").hide()
            $("#preBuyStatus").show()
            $("#playerScore").text(GLOBAL_DATA.selectedPlayer.score)
            $("#addpointInput").val(GLOBAL_DATA.selectedPlayer.score)
            GLOBAL_DATA.selectedPlayer.amount = GLOBAL_DATA.selectedPlayer.score
            // GLOBAL_DATA.timer = setInterval(timerFunction, 1500)
        }
        const addPointClick = () => {
            if (GLOBAL_DATA.timer) {
                clearInterval(GLOBAL_DATA.timer)
            }
            GLOBAL_DATA.current = GLOBAL_DATA.timeout;
            // $("#playerTimer").text(GLOBAL_DATA.current);
            const score = parseInt($("#playerScore").text())
            GLOBAL_DATA.selectedPlayer.score = score + 2
            $("#playerScore").text(GLOBAL_DATA.selectedPlayer.score)
            // GLOBAL_DATA.timer = setInterval(timerFunction, 1500)
        }
        const buyPlayerClick = () => {
            if (GLOBAL_DATA.timer) {
                clearInterval(GLOBAL_DATA.timer)
            }
            $("#buyStatus").show()
            $("#preBuyStatus").hide()
            $("#startBitting").show();
            $("#randomPlayer").show()
            $("#randomPlayer").text("Skip")
            $("#randomPlayer").attr("class", "btn btn-danger");
            // $("#playerTimer").css("font-size", '25px')
            // $("#playerTimer").text(`Bitting : ${GLOBAL_DATA.selectedPlayer.score}`);
        }
        const buyConfirmPlayerClick = () => {
            const amount = GLOBAL_DATA.selectedPlayer.amount
            const buyingCaption = $("#buyingCaption").val()
            const captain = GLOBAL_DATA.captains.find(item => item._id == buyingCaption);
            // count how many players this captain already bought
            const captainPlayers = $("#bittingDetails")
                .find(`h3:contains(${captain.name})`)
                .next("ul")
                .find("li").length || 0;

            // total auction players required
            const totalRequiredPlayers = 5;

            // remaining players after this purchase
            const remainingPlayers = Math.max(0, totalRequiredPlayers - (captainPlayers + 1));

            // remaining balance after buying
            const remainingBalance = captain.score - amount;

            // minimum balance needed to buy remaining players at base price
            const minimumRequired = remainingPlayers * 5;

            if (remainingBalance < minimumRequired) {
                $("#message").show()
                $("#message").html(`
        <div class="alert alert-danger" role="alert">
        ${captain.name} cannot buy this player. Minimum balance required for remaining players is ${minimumRequired}.
        </div>
    `)
                return
            }
            if (captain.score < amount) {
                $("#message").show()
                $("#message").html(`
                <div class="alert alert-danger" role="alert">
               captain Does not have sufficient amount to buy the player
                </div>`)
                return
            }
            const body = {
                captain: buyingCaption,
                player: GLOBAL_DATA.selectedPlayer._id,
                amount
            }
            console.log("body", body)
            axios.post("/buy", body).then(response => {
                console.log(response)
                if (response.status == 200) {
                    $("#message").show()
                    $("#message").html(`
                <div class="alert alert-success" role="alert">
               ${GLOBAL_DATA.selectedPlayer.name}  has been bought by ${captain.name} for an amount of ${amount}.
                </div>`)
                    $("#randomPlayer").show()
                    $("#randomPlayer").text("Pick Random Player")
                    $("#randomPlayer").attr("class", "btn btn-success");
                    $("#playerCard").hide()
                    $("#startBitting").hide()
                    loadPlayers()
                    loadCaptains()
                    loadBittingDetails()

                }

            }).catch(err => {
                console.log("Player Buy error", err)
            })
        }

        $(document).on("click", "#Confirm", () => {
            buyConfirmPlayerClick()
        })

        $(document).on("click", "#buy", () => {
            buyPlayerClick()
        })
        $(document).on("click", "#addPoint", () => {
            addPointClick()
        })
        $(document).on("click", "#startBitting", () => {
            startBittingClick()
        })
        $(document).on("click", "#randomPlayer", () => {
            randomPlayerSelect()
        })

        $(document).on("change", "#addpointInput", () => {
            GLOBAL_DATA.selectedPlayer.amount = parseInt($("#addpointInput").val())
            $("#playerScore").text(GLOBAL_DATA.selectedPlayer.amount)
        })

        const loadBittingDetails = () => {
            const bittingDetails = $("#bittingDetails")
            bittingDetails.empty()
            axios.get("/bitting").then(result => {
                console.log(result)
                const deatils = {}
                result.data.forEach(element => {
                    console.log("element", element)
                    const captain = element["captain"]
                    console.log("captain", captain)
                    if (!deatils[captain]) {
                        deatils[captain] = {
                            captionDetails: element["captionDetails"],
                            playerDetails: []
                        }
                    }
                    console.log("deatils[captain]", deatils[captain])

                    deatils[captain]["playerDetails"].push({ ...element.playerDetails, amount: element.amount })
                });
                console.log("details", deatils)
                for (const deatil of Object.values(deatils)) {
                    const teamClassName = deatil.captionDetails.name.toLowerCase().replace(/\s+/g, '-') + '-team';

                    bittingDetails.append(`
    <div>
        <h3 class="${teamClassName}">${deatil.captionDetails.name}</h3>
        <ul class="list-group">
            ${deatil.playerDetails.map(player => `<li class="list-group-item">${player.name} | ${player.designation} - ${player.amount}</li>`).join("")}
        </ul>
    </div>
`);

                }

            }).catch(err => {
                console.log("Axios error", err)
            })
        }


        $(document).ready(() => {
            loadCaptains()
            loadPlayers()
            loadBittingDetails()
            $("#playerCard").hide()
            $("#startBitting").hide()
            // $("#startBitting").hide()
        })
    </script>
